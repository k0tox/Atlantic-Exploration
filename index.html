<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fisch Bucket Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="hudTop">
    <span id="hudRegion">Region: Harbor's Rest</span>
    <span id="hudGPS">X: 0 | Y: 0 | Z: 0</span>
    <span id="hudDepth">Depth: 0m</span>
  </div>

  <div id="hudCenterBanner"></div>

  <div id="hudBottom">
    <div id="hotbar">
      <div class="hotbar-slot" id="btnRod" data-slot="1">Rod</div>
      <div class="hotbar-slot" id="btnToolBag" data-slot="2">Tool Bag</div>
      <div class="hotbar-slot" id="btnBaitBag" data-slot="3">Bait Bag</div>
      <div class="hotbar-slot" id="btnBestiary" data-slot="4">Bestiary</div>
      <div class="hotbar-slot" id="btnQuest" data-slot="5">Quest Scroll</div>
      <div class="hotbar-slot" id="btnTotems" data-slot="6">Totems</div>
      <div class="hotbar-slot" id="btnPotions" data-slot="7">Potions</div>
      <div class="hotbar-slot" id="btnRelic" data-slot="8">Relic Key</div>
      <div class="hotbar-slot" id="btnUtility" data-slot="9">Utility</div>
    </div>
    <div id="catchAlert">!</div>
  </div>

  <div id="radarContainer">
    <canvas id="radarCanvas" width="140" height="140"></canvas>
  </div>

  <!-- Simple prototype GUIs -->
  <div id="panelRod" class="gui-panel">Rod details go here.</div>
  <div id="panelToolBag" class="gui-panel">Tool bag contents.</div>
  <div id="panelBaitBag" class="gui-panel">Bait bag contents.</div>
  <div id="panelBestiary" class="gui-panel">Bestiary entries.</div>
  <div id="panelQuest" class="gui-panel">Quest log.</div>
  <div id="panelTotems" class="gui-panel">Totems and weather events.</div>
  <div id="panelPotions" class="gui-panel">Potions list.</div>
  <div id="panelRelic" class="gui-panel">Relic key info.</div>
  <div id="panelUtility" class="gui-panel">Utility items.</div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>

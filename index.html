<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fisch Bucket Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="hudTop">
    <span id="hudRegion">Region: Harbor's Rest</span>
    <span id="hudGPS">X: 0 | Y: 0 | Z: 0</span>
    <span id="hudDepth">Depth: 0m</span>
  </div>

  <div id="hudCenterBanner"></div>

  <div id="hudBottom">
    <div id="hotbar">
      <div class="hotbar-slot" id="btnRod" data-slot="1">Rod</div>
      <div class="hotbar-slot" id="btnToolBag" data-slot="2">Tool Bag</div>
      <div class="hotbar-slot" id="btnBaitBag" data-slot="3">Bait Bag</div>
      <div class="hotbar-slot" id="btnBestiary" data-slot="4">Bestiary</div>
      <div class="hotbar-slot" id="btnQuest" data-slot="5">Quest Scroll</div>
      <div class="hotbar-slot" id="btnTotems" data-slot="6">Totems</div>
      <div class="hotbar-slot" id="btnPotions" data-slot="7">Potions</div>
      <div class="hotbar-slot" id="btnRelic" data-slot="8">Relic Key</div>
      <div class="hotbar-slot" id="btnUtility" data-slot="9">Utility</div>
    </div>
    <div id="catchAlert">!</div>
  </div>

  <div id="fishRadar">
    <div id="radarArrow">▲</div>
    <div id="radarLabel">No fish detected</div>
  </div>

  <div id="panelRod" class="gui-panel">
    <h2>Rods</h2>
    <div class="gui-panel-body" id="rodList"></div>
  </div>

  <div id="panelToolBag" class="gui-panel">
    <h2>Tool Bag</h2>
    <div class="gui-panel-body" id="toolList"></div>
  </div>

  <div id="panelBaitBag" class="gui-panel">
    <h2>Bait Bag</h2>
    <div class="gui-panel-body" id="baitList"></div>
  </div>

  <div id="panelBestiary" class="gui-panel">
    <h2>Bestiary</h2>
    <div id="bestiaryTabs">
      <button data-tab="fish">Fish</button>
      <button data-tab="rods">Rods</button>
      <button data-tab="islands">Islands</button>
    </div>
    <div id="bestiaryContent">
      <div id="bestiaryFish" class="bestiary-section"></div>
      <div id="bestiaryRods" class="bestiary-section"></div>
      <div id="bestiaryIslands" class="bestiary-section"></div>
    </div>
  </div>

  <div id="panelQuest" class="gui-panel">
    <h2>Quests</h2>
    <div class="gui-panel-body" id="questList"></div>
  </div>

  <div id="panelTotems" class="gui-panel">
    <h2>Totems</h2>
    <div class="gui-panel-body" id="totemList"></div>
  </div>

  <div id="panelPotions" class="gui-panel">
    <h2>Potions</h2>
    <div class="gui-panel-body" id="potionList"></div>
  </div>

  <div id="panelRelic" class="gui-panel">
    <h2>Relic Key</h2>
    <div class="gui-panel-body" id="relicInfo"></div>
  </div>

  <div id="panelUtility" class="gui-panel">
    <h2>Utility</h2>
    <div class="gui-panel-body" id="utilityList"></div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
